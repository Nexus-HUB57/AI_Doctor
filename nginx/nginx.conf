# AI_Doctor — Nginx Reverse Proxy Configuration
# Place SSL certs in nginx/ssl/ (fullchain.pem + privkey.pem)

upstream ai_doctor_backend {
    # Docker DNS round-robin across replicas
    server app:3000;
    # Add more server lines if running replicas outside Docker Compose
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS in production
    # Comment out for initial setup without SSL
    # return 301 https://$host$request_uri;

    # Allow HTTP for health checks and initial setup
    location / {
        proxy_pass http://ai_doctor_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running AI analysis requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

