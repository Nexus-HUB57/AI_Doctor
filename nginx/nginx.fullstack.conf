# AI_Doctor — Nginx Reverse Proxy Configuration (Full-Stack + SSL)
# Routes: / -> Web App, /dashboard -> Streamlit, /api/health -> health
# SSL: Place certs in nginx/ssl/ (fullchain.pem + privkey.pem)
#       Or use certbot --nginx for Let's Encrypt auto-renewal

upstream ai_doctor_web {
    least_conn;
    server web:3000;
}

upstream ai_doctor_streamlit {
    server streamlit:8501;
}

# ── HTTP -> HTTPS Redirect ──────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Health check bypasses redirect (for Docker healthcheck / ALB)
    location /api/health {
        proxy_pass http://ai_doctor_web;
        access_log off;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # SSL Configuration (production-grade)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout  10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS (1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://aistudio.google.com https://generativelanguage.googleapis.com wss:;" always;

    # Body size limit (match Express 1MB default)
    client_max_body_size 20m;

    # Health check (direct, no logging)
    location /api/health {
        proxy_pass http://ai_doctor_web;
        access_log off;
    }

    # Streamlit Dashboard
    location /dashboard/ {
        proxy_pass http://ai_doctor_streamlit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Streamlit static assets
    location /_stcore/ {
        proxy_pass http://ai_doctor_streamlit/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Main Web Application (React + Express + tRPC)
    location / {
        proxy_pass http://ai_doctor_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running AI analysis requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}