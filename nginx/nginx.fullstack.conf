# AI_Doctor — Nginx Reverse Proxy Configuration (Full-Stack)
# Routes: / -> Web App, /dashboard -> Streamlit, /api/health -> health
# Place SSL certs in nginx/ssl/ (fullchain.pem + privkey.pem)

upstream ai_doctor_web {
    server web:3000;
}

upstream ai_doctor_streamlit {
    server streamlit:8501;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    client_max_body_size 20M;

    # Health check (no proxy, direct response)
    location /api/health {
        proxy_pass http://ai_doctor_web;
        access_log off;
    }

    # Streamlit Dashboard
    location /dashboard/ {
        proxy_pass http://ai_doctor_streamlit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit WebSocket support
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Streamlit static assets
    location /_stcore/ {
        proxy_pass http://ai_doctor_streamlit/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Main Web Application (React + Express + tRPC)
    location / {
        proxy_pass http://ai_doctor_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running AI analysis requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}

