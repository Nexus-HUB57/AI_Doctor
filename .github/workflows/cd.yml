# AI_Doctor — Continuous Deployment
# Builds and pushes Docker image on merge to main; deploys on tag

name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & Push Docker Image ───────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_VERSION=${{ github.ref_name }}

  # ── Deploy to Staging (on main push) ────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.ai-doctor.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image-tag }} to staging..."
          echo "Digest: ${{ needs.build-and-push.outputs.image-digest }}"
          echo ""
          echo "In a real setup, this would:"
          echo "  1. SSH into staging server"
          echo "  2. Pull the new image from GHCR"
          echo "  3. Run docker-compose -f docker-compose.staging.yml up -d"
          echo "  4. Wait for healthcheck to pass"
          echo "  5. Run smoke tests"
          echo ""
          echo "Image ready for staging deployment."

  # ── Deploy to Production (on version tag) ───────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://ai-doctor.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image-tag }} to PRODUCTION..."
          echo "Digest: ${{ needs.build-and-push.outputs.image-digest }}"
          echo "Version tag: ${{ github.ref_name }}"
          echo ""
          echo "In a real setup, this would:"
          echo "  1. Run pre-deploy smoke tests"
          echo "  2. SSH into production server"
          echo "  3. Pull the new image"
          echo "  4. Perform rolling update (zero-downtime)"
          echo "  5. Verify healthcheck"
          echo "  6. Run post-deploy validation"
          echo ""
          echo "PRODUCTION DEPLOY READY."