# AI_Doctor — Continuous Integration
# Runs on every push and PR: lint, type-check, unit tests, build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Lint & Type Check ──────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── 2. Unit & Integration Tests ──────────────────────
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test
          GEMINI_API_KEY: test-key-for-ci-long-enough-to-pass-validation
          JWT_SECRET: test-secret-key-for-ci-long-enough

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node }}
          path: |
            coverage/
          retention-days: 7

  # ── 3. Build Verification ────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify dist output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo ""
          echo "=== index.html exists ==="
          test -f dist/index.html && echo "OK" || exit 1
          echo "=== Bundle size ==="
          du -sh dist/

  # ── 4. Docker Build Test ─────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ai-doctor:test