version: '3.8'

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      # Security: JWT_SECRET MUST be provided externally (no default!)
      - JWT_SECRET=${JWT_SECRET:?ERROR: JWT_SECRET is required. Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"}
      - GEMINI_API_KEY=${GEMINI_API_KEY:?ERROR: GEMINI_API_KEY is required. Get yours at https://aistudio.google.com/apikey}
      - DATABASE_URL=${DATABASE_URL:-}
      - PORT=3000
    volumes:
      - app_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/trpc/persistence.analytics.getSystemStats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app_data: