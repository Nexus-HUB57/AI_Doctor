# AI_Doctor — Staging Environment
# Usage: docker compose -f docker-compose.staging.yml up -d
#
# Staging mirrors production but with:
#   - Debug logging enabled
#   - Single replica
#   - Relaxed resource limits
#   - Volume mounts for live debugging

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-doctor-staging
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=staging
      - GEMINI_API_KEY=${GEMINI_API_KEY:?ERROR: GEMINI_API_KEY is required}
      - JWT_SECRET=${JWT_SECRET:?ERROR: JWT_SECRET is required}
      - DATABASE_URL=${DATABASE_URL:-}
      - PORT=3000
      - DISABLE_HMR=true
    volumes:
      - app_staging_data:/app/data
      - app_staging_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  app_staging_data:
  app_staging_logs: